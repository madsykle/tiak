version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: tiak-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks:
      - tiak-network

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tiak-backend
    restart: unless-stopped
    environment:
      - MONGODB_URI=mongodb://mongodb:27017/tiak
      - PORT=4697
      - DATA_ROOT=/app/data
      - JWT_SECRET=change-me-to-a-very-long-random-string-in-production
      - ADMIN_PASSWORD=change-me-on-first-run
      - ENABLE_AUTH=true
      - CORS_ORIGINS=http://localhost,http://localhost:3000
    volumes:
      - ./data:/app/data
    depends_on:
      - mongodb
    networks:
      - tiak-network

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_BASE=/api
    container_name: tiak-frontend
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - backend
    networks:
      - tiak-network

  nginx:
    image: nginx:alpine
    container_name: tiak-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./data:/app/data:ro # Optional: allow direct static serving of media if needed in future
    depends_on:
      - backend
      - frontend
    networks:
      - tiak-network

volumes:
  mongo_data:

networks:
  tiak-network:
    driver: bridge

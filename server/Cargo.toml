[package]
name = "server"
version = "0.1.0"
edition = "2021"

[dependencies]
axum = { version = "0.7", features = ["multipart"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "sqlite"] }
tower = { version = "0.5", features = ["util"] }
tower-http = { version = "0.6", features = ["cors", "trace", "fs", "limit", "compression-gzip", "compression-br"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
anyhow = "1"
walkdir = "2"
chrono = { version = "0.4", features = ["serde"] }
uuid = { version = "1", features = ["v4", "serde"] }
zip = "2"
dotenv = "0.15"
regex = "1"
dashmap = "6"
tokio-util = { version = "0.7", features = ["io"] }
moka = { version = "0.12", features = ["future"] }
jsonwebtoken = { version = "10", features = ["rust_crypto"] }
time = "0.3"
lazy_static = "1"
argon2 = "0.5.3"
password-hash = "0.6.1"
mongodb = "3.6.0"
futures = "0.3.32"
tokio-stream = "0.1.18"
rand = "0.8"
getrandom = "0.4.2"

[dev-dependencies]
tempfile = "3"

[profile.dev]
debug = 0 # Disables debug info to significantly reduce `target/` directory size during development

[profile.release]
opt-level = "z"     # Optimize for size
lto = true          # Enable Link Time Optimization
codegen-units = 1   # Reduce number of codegen units to increase optimizations
panic = "abort"     # Abort on panic
strip = true        # Automatically strip symbols from the binary

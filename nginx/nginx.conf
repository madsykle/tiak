user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Rate limiting zones
    # general_api allows 10 requests per second per IP
    limit_req_zone $binary_remote_addr zone=general_api:10m rate=10r/s;
    # heavy_api allows 5 requests per minute per IP for resolve and queue additions
    limit_req_zone $binary_remote_addr zone=heavy_api:10m rate=5r/m;

    server {
        listen 80;
        server_name localhost;

        # Secure headers
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; media-src 'self' data: blob:; connect-src 'self' ws: wss:;" always;

        # Next.js Web Frontend
        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Rust Backend API
        location /api {
            limit_req zone=general_api burst=20 nodelay;
            proxy_pass http://backend:4697/api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            client_max_body_size 100M;
        }

        # Heavy endpoints (resolve and add queue)
        location /api/files/resolve {
            limit_req zone=heavy_api burst=5 nodelay;
            proxy_pass http://backend:4697/api/files/resolve;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/queue/add {
            limit_req zone=heavy_api burst=5 nodelay;
            proxy_pass http://backend:4697/api/queue/add;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Rust Backend Streaming/Static Files
        location /api/files/stream {
            proxy_pass http://backend:4697/api/files/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Disable buffering for smooth streaming
            proxy_buffering off;
            proxy_read_timeout 600s;
        }

        # Health endpoint
        location /health {
            proxy_pass http://backend:4697/health;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
    }
}
